<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChuniJudgeVisualizer</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #aaa;
      font-family: sans-serif;
    }

    /* 中央寄せ用コンテナ */
    .wrapper {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ヘッダー */
    .header {
      background: #666;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      border-radius: 10px;
      margin: 10px;
    }

    /* PCレイアウト */
    .main {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 10px;
      margin: 10px;
    }

    /* 共通のボックス */
    .box {
      background: #ddd;
      border-radius: 10px;
      padding: 10px;
      min-width: 0;
    }

    /* キャンバス */
    .canvas-box {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      touch-action: none;
      overflow: hidden;
      padding: 0;
    }

    canvas {
      width: 100%;
      max-width: 400px;
      /* ここで見た目サイズを制御 */
      height: auto;
      background: #222;
      border-radius: 10px;
      display: block;
      margin: 0 auto;
    }

    /* テキスト入力欄 */
    textarea {
      width: 100%;
      height: 120px;
      resize: none;
      max-width: 100%;
    }

    /* ボタン */
    .buttons {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* スマホ用設定 */
    .details {
      display: none;
    }

    /* ▼ スマホレイアウト */
    @media (max-width: 767px) {
      .wrapper {
        max-width: 100%;
      }

      .main {
        display: flex;
        flex-direction: column;
      }

      .canvas-box {
        height: 300px;
        overflow: hidden;
        align-items: flex-start;
      }

      .details {
        display: block;
        overflow-wrap: anywhere;
      }

      .pc-only {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <div class="header">CHUNITHM判定帯可視化ツール</div>

    <div class="main">

      <!-- キャンバス -->
      <div class="box canvas-box">
        <canvas id="canvas"></canvas>
      </div>

      <!-- 右側 -->
      <div class="side">

        <!-- テキスト入力欄 -->
        <div class="box">
          <textarea id="input" placeholder="譜面入力"></textarea>
        </div>

        <!-- ボタン -->
        <div class="box buttons">
          <button id="helpBtn">ヘルプ</button>
          <button id="saveBtn">保存</button>
        </div>

        <!-- PCチェックボックス -->
        <div class="box pc-only">
          <label><input type="checkbox" id="showNotes" checked> ノーツ</label><br>
          <label><input type="checkbox" id="showJudge" checked> 判定</label>
        </div>

        <!-- ノーツ一覧 -->
        <div class="box" style="max-height: 300px; overflow-y: auto; font-size: 12px;">
          <div id="notesList" style="font-family: monospace; white-space: pre-wrap; word-break: break-all;"></div>
        </div>

        <!-- スマホ用ドロワー -->
        <details class="box details">
          <summary>表示設定</summary>
          <label><input type="checkbox" id="showNotes" checked> ノーツ</label><br>
          <label><input type="checkbox" id="showJudge" checked> 判定</label>
        </details>

      </div>

    </div>

    <!-- ヘルプ -->
    <div id="help" class="box" style="display:none; margin:10px;">
      ここに説明を書く
    </div>

  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let scrollY = 0;
    let touchDragging = false;
    let lastTouchY = 0;
    let lastTouchTime = 0;
    let touchVelocity = 0;
    let inertiaFrame = null;

    function resize() {
      canvas.width = 800;
      canvas.height = 1200;
      draw();
    }
    window.addEventListener("resize", resize);
    resize();

    function getVisibleCanvasHeight() {
      const canvasRect = canvas.getBoundingClientRect();
      const containerRect = canvas.parentElement
        ? canvas.parentElement.getBoundingClientRect()
        : canvasRect;

      if (canvasRect.height <= 0) {
        return canvas.height;
      }

      const visibleCssHeight = Math.min(canvasRect.height, containerRect.height);
      return canvas.height * (visibleCssHeight / canvasRect.height);
    }

    function stopInertiaScroll() {
      if (inertiaFrame !== null) {
        cancelAnimationFrame(inertiaFrame);
        inertiaFrame = null;
      }
    }

    function startInertiaScroll() {
      stopInertiaScroll();

      const tick = () => {
        if (Math.abs(touchVelocity) < 0.02) {
          touchVelocity = 0;
          inertiaFrame = null;
          return;
        }

        scrollY += touchVelocity * 16;
        touchVelocity *= 0.92;
        draw();
        inertiaFrame = requestAnimationFrame(tick);
      };

      inertiaFrame = requestAnimationFrame(tick);
    }

    function hexToNum(c) {
      if (c >= '1' && c <= '9') return c.charCodeAt(0) - 48;
      return c.charCodeAt(0) - 55;
    }

    function getSafeBpm(value, fallback = 120) {
      const bpm = Number(value);
      return Number.isFinite(bpm) && bpm > 0 ? bpm : fallback;
    }

    function readBpmFromInput(input, fallback = 120) {
      let bpm = fallback;
      const lines = input.split("\n");

      for (let line of lines) {
        const m = line.match(/^\s*#\s*bpm\s+([0-9]+(?:\.[0-9]+)?)/i);
        if (m) bpm = getSafeBpm(m[1], fallback);
      }

      return bpm;
    }

    function parse(input) {
      input = input.replace(/\n/g, "");

      let bpm = 120;
      let div = 4;
      let time = 0;
      let divisionIndex = 0;

      const notes = [];

      const beatTime = () => 60000 / bpm;
      const measureTime = () => beatTime() * 4;

      const tokens = input.split(/(\{.*?\}|,)/).filter(t => t !== "");

      for (let token of tokens) {

        if (token.startsWith("#")) {
          const m = token.match(/^\s*#\s*bpm\s+([0-9]+(?:\.[0-9]+)?)/i);
          if (m) bpm = getSafeBpm(m[1], bpm);
          continue;
        }

        if (token.startsWith("{")) {
          const m = token.match(/\{(\d+)\}/);
          if (m) {
            div = Number(m[1]);
            divisionIndex = 0;
          }
          continue;
        }

        if (token === ",") {
          time += measureTime() / div;
          divisionIndex++;
          continue;
        }

        const groups = token.split("/");

        for (let g of groups) {
          if (!g) continue;

          // ▼ Exノーツは末尾にe付き
          const isEx = g.endsWith("e");
          if (isEx) g = g.slice(0, -1);

          let lane = hexToNum(g[0]);
          let width = hexToNum(g[1]);

          let hold = 0;

          if (g.includes("h")) {
            const m = g.match(/h\[(\d+):(\d+)\]/);
            if (m) {
              const base = Number(m[1]);
              const count = Number(m[2]);
              hold = (4 / base) * count;
            }
          }

          notes.push({
            time,
            lane,
            width,
            hold,
            isEx,
            div,
            divIndex: divisionIndex
          });
        }
      }

      return notes;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawGridDynamic(
      ctx,
      canvas,
      padding,
      scrollY,
      pxPerBeat,
      startLineY,
      minBeat,
      maxBeat
    ) {
      const laneCount = 16;
      const usableWidth = canvas.width - padding * 2;
      const laneWidth = usableWidth / laneCount;

      // 邵ｦ邱・
      for (let i = 0; i <= laneCount; i++) {
        const x = padding + i * laneWidth;

        ctx.lineWidth = (i === 0 || i === laneCount) ? 3 : 1;
        ctx.strokeStyle = (i === 0 || i === laneCount)
          ? "rgba(255,255,255,0.5)"
          : "rgba(255,255,255,0.2)";

        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }

      // 讓ｪ邱・
      const startIndex = Math.floor(minBeat);
      const endIndex = Math.ceil(maxBeat);

      for (let i = startIndex; i <= endIndex; i++) {
        const y =
          startLineY -
          (i - minBeat) * pxPerBeat -
          scrollY;

        if (y < 0 || y > canvas.height) continue;

        ctx.lineWidth = (i % 4 === 0) ? 2 : 1;
        ctx.strokeStyle = (i % 4 === 0)
          ? "rgba(255,255,255,0.4)"
          : "rgba(255,255,255,0.15)";

        ctx.beginPath();
        ctx.moveTo(padding, y);
        ctx.lineTo(canvas.width - padding, y);
        ctx.stroke();
      }
    }

    function rangesOverlap(aStart, aEnd, bStart, bEnd) {
      return Math.max(aStart, bStart) < Math.min(aEnd, bEnd);
    }

    function getJudgeWindows() {
      const bpm225BeatMs = 60000 / 225;
      return {
        attack: 100,
        justice: bpm225BeatMs / 4,
        justiceCritical: bpm225BeatMs / 8
      };
    }

    function getOccupiedLanes(note) {
      const lanes = [];
      const startLane = note.lane;
      const endLane = note.lane + note.width - 1;

      for (let lane = startLane; lane <= endLane; lane++) {
        if (lane >= 1 && lane <= 16) {
          lanes.push(lane);
        }
      }

      return lanes;
    }

    function buildLaneJudgeSegments(notes, laneWidth, offsetX) {
      const windows = getJudgeWindows();
      const occupiedLanesList = notes.map(getOccupiedLanes);
      const occupiedLaneSets = occupiedLanesList.map(lanes => new Set(lanes));

      return notes.map((note, noteIndex) => {
        const segments = [];
        const occupiedLanes = occupiedLanesList[noteIndex];

        // TAPは「使用レーンのどこかで重なる最近傍」を使って、
        // ノーツ全体で共通の所有時間を決める。
        if (!note.isEx) {
          let ownershipStart = note.time - windows.attack;
          let ownershipEnd = note.time + windows.attack;
          let nearestPrevTime = -Infinity;
          let nearestNextTime = Infinity;

          for (let otherIndex = 0; otherIndex < notes.length; otherIndex++) {
            if (otherIndex === noteIndex) continue;

            let overlapsAnyLane = false;
            for (const lane of occupiedLanes) {
              if (occupiedLaneSets[otherIndex].has(lane)) {
                overlapsAnyLane = true;
                break;
              }
            }
            if (!overlapsAnyLane) continue;

            const otherTime = notes[otherIndex].time;
            if (otherTime < note.time && otherTime > nearestPrevTime) {
              nearestPrevTime = otherTime;
            }
            if (otherTime > note.time && otherTime < nearestNextTime) {
              nearestNextTime = otherTime;
            }
          }

          if (nearestPrevTime !== -Infinity) {
            const splitPrev = (nearestPrevTime + note.time) / 2;
            ownershipStart = Math.max(ownershipStart, splitPrev);
          }
          if (nearestNextTime !== Infinity) {
            const splitNext = (nearestNextTime + note.time) / 2;
            ownershipEnd = Math.min(ownershipEnd, splitNext);
          }

          const justiceStart = Math.max(ownershipStart, note.time - windows.justice);
          const justiceEnd = Math.min(ownershipEnd, note.time + windows.justice);

          const criticalHalf = windows.justiceCritical;
          let criticalStart = Math.max(ownershipStart, note.time - criticalHalf);
          let criticalEnd = Math.min(ownershipEnd, note.time + criticalHalf);

          const minCriticalWidth = criticalHalf * 2;
          if (criticalEnd - criticalStart < minCriticalWidth) {
            criticalStart = note.time - criticalHalf;
            criticalEnd = note.time + criticalHalf;
          }

          for (const lane of occupiedLanes) {
            segments.push({
              x: (lane - 1) * laneWidth + offsetX,
              w: laneWidth,
              ownershipStart,
              ownershipEnd,
              justiceStart,
              justiceEnd,
              criticalStart,
              criticalEnd
            });
          }

          return segments;
        }

        // ExTAPはレーンごとに最近傍を探し、レーンごとに所有時間を持つ。
        for (const lane of occupiedLanes) {
          let ownershipStart = note.time - windows.attack;
          let ownershipEnd = note.time + windows.attack;
          let nearestPrevTime = -Infinity;
          let nearestNextTime = Infinity;

          for (let otherIndex = 0; otherIndex < notes.length; otherIndex++) {
            if (otherIndex === noteIndex) continue;
            if (!occupiedLaneSets[otherIndex].has(lane)) continue;

            const otherTime = notes[otherIndex].time;
            if (otherTime < note.time && otherTime > nearestPrevTime) {
              nearestPrevTime = otherTime;
            }
            if (otherTime > note.time && otherTime < nearestNextTime) {
              nearestNextTime = otherTime;
            }
          }

          if (nearestPrevTime !== -Infinity) {
            const splitPrev = (nearestPrevTime + note.time) / 2;
            ownershipStart = Math.max(ownershipStart, splitPrev);
          }
          if (nearestNextTime !== Infinity) {
            const splitNext = (nearestNextTime + note.time) / 2;
            ownershipEnd = Math.min(ownershipEnd, splitNext);
          }

          segments.push({
            x: (lane - 1) * laneWidth + offsetX,
            w: laneWidth,
            ownershipStart,
            ownershipEnd,
            justiceStart: null,
            justiceEnd: null,
            criticalStart: ownershipStart,
            criticalEnd: ownershipEnd
          });
        }

        return segments;
      });
    }

    function renderToggleControls() {
      const controlsHtml = `
        <label><input type="checkbox" class="toggle-show-notes" checked> ノーツ</label><br>
        <label><input type="checkbox" class="toggle-show-attack" checked> ATTACK</label><br>
        <label><input type="checkbox" class="toggle-show-justice" checked> JUSTICE</label><br>
        <label><input type="checkbox" class="toggle-show-critical" checked> JUSTICE CRITICAL</label>
      `;

      const pcControls = document.querySelector(".pc-only");
      if (pcControls) {
        pcControls.innerHTML = controlsHtml;
      }

      const mobileControls = document.querySelector(".details");
      if (mobileControls) {
        mobileControls.innerHTML = `<summary>表示設定</summary>${controlsHtml}`;
      }
    }

    function isToggleChecked(className) {
      const toggle = document.querySelector(`.${className}`);
      return toggle ? toggle.checked : true;
    }

    function syncToggleInputs(changedInput) {
      const toggleClass = [...changedInput.classList].find(name => name.startsWith("toggle-"));
      if (!toggleClass) return;

      for (let input of document.querySelectorAll(`.${toggleClass}`)) {
        input.checked = changedInput.checked;
      }
    }

    function createRenderModel() {
      const padding = 80;
      const input = document.getElementById("input").value;
      const notes = parse(input);

      const showNotes = isToggleChecked("toggle-show-notes");
      const showAttack = isToggleChecked("toggle-show-attack");
      const showJustice = isToggleChecked("toggle-show-justice");
      const showCritical = isToggleChecked("toggle-show-critical");

      const bpm = readBpmFromInput(input, 120);
      const beatMs = 60000 / bpm;
      const measureMs = beatMs * 4;

      const pxPerMeasure = 1280;

      const usableWidth = canvas.width - padding * 2;
      const laneWidth = usableWidth / 16;
      const offsetX = padding;
      const laneJudgeSegmentsList = buildLaneJudgeSegments(notes, laneWidth, offsetX);

      let minMeasure = Infinity;
      let maxMeasure = -Infinity;

      for (let n of notes) {
        const m = n.time / measureMs;
        minMeasure = Math.min(minMeasure, m);
        maxMeasure = Math.max(maxMeasure, m + n.hold / 4);
      }

      if (minMeasure === Infinity) {
        minMeasure = 0;
        maxMeasure = 1;
      }

      const marginMeasure = 1 / 8;
      const contentStartMeasure = minMeasure - marginMeasure;
      const contentEndMeasure = maxMeasure + marginMeasure;
      const gridStartMeasure = Math.floor(contentStartMeasure);
      const gridEndMeasure = Math.ceil(contentEndMeasure);
      const contentHeight = (contentEndMeasure - contentStartMeasure) * pxPerMeasure;

      return {
        notes,
        showNotes,
        showAttack,
        showJustice,
        showCritical,
        measureMs,
        pxPerMeasure,
        laneWidth,
        offsetX,
        laneJudgeSegmentsList,
        padding,
        contentStartMeasure,
        gridStartMeasure,
        gridEndMeasure,
        contentHeight
      };
    }

    function canExportImage(model) {
      const hasNotes = model.notes.length > 0;
      const hasVisibleLayer =
        model.showNotes ||
        model.showAttack ||
        model.showJustice ||
        model.showCritical;

      return hasNotes && hasVisibleLayer;
    }

    function updateSaveButtonState(model) {
      const saveBtn = document.getElementById("saveBtn");
      const canSave = canExportImage(model);
      saveBtn.disabled = !canSave;
      saveBtn.title = canSave
        ? ""
        : "譜面がない、または表示項目がすべてオフのため保存できません";
    }

    function renderScene(targetCtx, targetCanvas, model, currentScrollY) {
      targetCtx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
      targetCtx.fillStyle = "#000";
      targetCtx.fillRect(0, 0, targetCanvas.width, targetCanvas.height);

      const {
        notes,
        showNotes,
        showAttack,
        showJustice,
        showCritical,
        measureMs,
        pxPerMeasure,
        laneWidth,
        offsetX,
        laneJudgeSegmentsList,
        padding,
        contentStartMeasure,
        gridStartMeasure,
        gridEndMeasure,
        contentHeight
      } = model;

      const timeToY = (timeMs) =>
        contentHeight - ((timeMs / measureMs) - contentStartMeasure) * pxPerMeasure - currentScrollY + padding;

      for (let i = 0; i <= 16; i++) {
        const x = padding + i * laneWidth;

        targetCtx.lineWidth = (i === 0 || i === 16) ? 3 : 1;
        targetCtx.strokeStyle = (i === 0 || i === 16)
          ? "rgba(255,255,255,0.5)"
          : "rgba(255,255,255,0.2)";

        targetCtx.beginPath();
        targetCtx.moveTo(x, 0);
        targetCtx.lineTo(x, targetCanvas.height);
        targetCtx.stroke();
      }

      for (let m = gridStartMeasure; m <= gridEndMeasure; m++) {

        let worldY = (m - contentStartMeasure) * pxPerMeasure;

        let y = contentHeight - worldY - currentScrollY + padding;

        if (y >= -padding && y <= targetCanvas.height + padding) {
          targetCtx.lineWidth = 2;
          targetCtx.strokeStyle = "rgba(255,255,255,0.4)";
          targetCtx.beginPath();
          targetCtx.moveTo(padding, y);
          targetCtx.lineTo(targetCanvas.width - padding, y);
          targetCtx.stroke();
        }

        for (let b = 1; b < 4; b++) {
          const subY = y - b * (pxPerMeasure / 4);

          if (subY >= -padding && subY <= targetCanvas.height + padding) {
            targetCtx.lineWidth = 1;
            targetCtx.strokeStyle = "rgba(255,255,255,0.15)";
            targetCtx.beginPath();
            targetCtx.moveTo(padding, subY);
            targetCtx.lineTo(targetCanvas.width - padding, subY);
            targetCtx.stroke();
          }
        }
      }

      for (let i = 0; i < notes.length; i++) {
        const n = notes[i];
        const laneJudgeSegments = laneJudgeSegmentsList[i];
        const m = n.time / measureMs;
        const worldY = (m - contentStartMeasure) * pxPerMeasure;

        const y = contentHeight - worldY - currentScrollY + padding;

        const x = (n.lane - 1) * laneWidth + offsetX;
        const w = n.width * laneWidth;

        const color = n.isEx ? "yellow" : "red";

        if (showAttack || showJustice || showCritical) {
          for (const segment of laneJudgeSegments) {
            const attackTop = timeToY(segment.ownershipEnd);
            const attackBottom = timeToY(segment.ownershipStart);
            const criticalTop = timeToY(segment.criticalEnd);
            const criticalBottom = timeToY(segment.criticalStart);

            if (showCritical && criticalBottom > criticalTop) {
              targetCtx.fillStyle = "rgba(255, 255, 170, 0.5)";
              targetCtx.fillRect(segment.x, criticalTop, segment.w, criticalBottom - criticalTop);
            }

            if (!n.isEx && segment.justiceStart !== null && segment.justiceEnd !== null) {
              const justiceTop = timeToY(segment.justiceEnd);
              const justiceBottom = timeToY(segment.justiceStart);

              if (showJustice) {
                const justiceUpperEnd = Math.min(criticalTop, justiceBottom);
                if (justiceUpperEnd > justiceTop) {
                  targetCtx.fillStyle = "rgba(255, 165, 0, 0.5)";
                  targetCtx.fillRect(segment.x, justiceTop, segment.w, justiceUpperEnd - justiceTop);
                }

                const justiceLowerStart = Math.max(criticalBottom, justiceTop);
                if (justiceBottom > justiceLowerStart) {
                  targetCtx.fillStyle = "rgba(255, 165, 0, 0.5)";
                  targetCtx.fillRect(segment.x, justiceLowerStart, segment.w, justiceBottom - justiceLowerStart);
                }
              }

              if (showAttack) {
                const attackUpperEnd = Math.min(justiceTop, attackBottom);
                if (attackUpperEnd > attackTop) {
                  targetCtx.fillStyle = "rgba(0, 255, 120, 0.5)";
                  targetCtx.fillRect(segment.x, attackTop, segment.w, attackUpperEnd - attackTop);
                }

                const attackLowerStart = Math.max(justiceBottom, attackTop);
                if (attackBottom > attackLowerStart) {
                  targetCtx.fillStyle = "rgba(0, 255, 120, 0.5)";
                  targetCtx.fillRect(segment.x, attackLowerStart, segment.w, attackBottom - attackLowerStart);
                }
              }
            }
          }
        }

        if (showNotes) {
          targetCtx.fillStyle = color;
          roundRect(targetCtx, x, y - 5, w, 10, 4);
          targetCtx.fill();
        }

        if (n.hold > 0) {
          const holdMeasure = n.hold / 4;
          const holdHeight = holdMeasure * pxPerMeasure;

          targetCtx.fillStyle = "orange";
          roundRect(
            targetCtx,
            x,
            y - holdHeight,
            w,
            holdHeight,
            4
          );
          targetCtx.fill();
        }
      }
    }

    function draw() {
      const model = createRenderModel();
      const padding = model.padding;

      // =========================
      // ▼ スクロール範囲（上下に少し余白）
      // =========================

      const visibleCanvasHeight = getVisibleCanvasHeight();

      const minScroll = 0;
      const maxScroll = Math.max(0, model.contentHeight - visibleCanvasHeight + padding * 2);

      scrollY = Math.max(minScroll, Math.min(maxScroll, scrollY));

      renderScene(ctx, canvas, model, scrollY);
      updateSaveButtonState(model);
    }

    document.addEventListener("input", draw);
    document.addEventListener("change", (e) => {
      if (e.target.matches('input[type="checkbox"]')) {
        syncToggleInputs(e.target);
      }
      draw();
    });

    document.getElementById("saveBtn").onclick = () => {
      const model = createRenderModel();

      if (!canExportImage(model)) {
        alert("譜面がない、または表示項目がすべてオフのため保存できません");
        return;
      }

      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = canvas.width;
      exportCanvas.height = Math.max(1, Math.ceil(model.contentHeight + model.padding * 2));
      const exportCtx = exportCanvas.getContext("2d");

      renderScene(exportCtx, exportCanvas, model, 0);

      const url = exportCanvas.toDataURL();
      const a = document.createElement("a");
      a.href = url;
      a.download = "chart.png";
      a.click();
    };

    const helpBtn = document.getElementById("helpBtn");
    const helpDiv = document.getElementById("help");

    helpBtn.onclick = (e) => {
      e.stopPropagation();
      helpDiv.style.display = helpDiv.style.display === "block" ? "none" : "block";
    };

    document.addEventListener("click", (e) => {
      if (helpDiv.style.display === "block" && !helpDiv.contains(e.target) && e.target !== helpBtn) {
        helpDiv.style.display = "none";
      }
    });

    canvas.addEventListener("wheel", (e) => {
      e.preventDefault();
      stopInertiaScroll();

      // ▼ カメラを動かす（これだけ）
      scrollY += e.deltaY * 0.5;

      draw();
    });

    canvas.addEventListener("touchstart", (e) => {
      if (e.touches.length !== 1) return;

      stopInertiaScroll();
      touchDragging = true;
      lastTouchY = e.touches[0].clientY;
      lastTouchTime = performance.now();
      touchVelocity = 0;
    }, { passive: true });

    canvas.addEventListener("touchmove", (e) => {
      if (!touchDragging || e.touches.length !== 1) return;

      e.preventDefault();
      const currentTime = performance.now();
      const currentTouchY = e.touches[0].clientY;
      const deltaY = currentTouchY - lastTouchY;
      const deltaTime = Math.max(1, currentTime - lastTouchTime);

      scrollY -= deltaY * 2;
      touchVelocity = (-deltaY * 2) / deltaTime;
      lastTouchY = currentTouchY;
      lastTouchTime = currentTime;
      draw();
    }, { passive: false });

    const endTouchDrag = () => {
      if (touchDragging && Math.abs(touchVelocity) >= 0.02) {
        startInertiaScroll();
      }
      touchDragging = false;
    };

    canvas.addEventListener("touchend", endTouchDrag);
    canvas.addEventListener("touchcancel", endTouchDrag);

    renderToggleControls();
    draw();
  </script>

</body>

</html>
